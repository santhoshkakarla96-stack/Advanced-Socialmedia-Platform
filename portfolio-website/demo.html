const AuthCtx = createContext(null);
const DEMO = { _id:'demo1', username:'demo_user', displayName:'Demo User', email:'demo@socialsphere.dev', isVerified:true, followerCount:128, followingCount:64, avatar:{url:''} };
function AuthProvider({children}) {
  const [user,setUser] = useState(null);
  const [loading,setLoading] = useState(false);
  const login = async(email,password) => {
    setLoading(true);
    await new Promise(r=>setTimeout(r,700));
    setLoading(false);
    if(email==='demo@socialsphere.dev'&&password==='Demo1234'){setUser(DEMO);return;}
    const e=new Error('Invalid credentials');e.msg='Invalid credentials';throw e;
  };
  const register = async({username,email,displayName}) => {
    setLoading(true);
    await new Promise(r=>setTimeout(r,600));
    setLoading(false);
    setUser({...DEMO,username,email,displayName:displayName||username});
  };
  const logout=()=>setUser(null);
  return <AuthCtx.Provider value={{user,loading,login,register,logout,isAuthenticated:!!user}}>{children}</AuthCtx.Provider>;
}
const useAuth=()=>useContext(AuthCtx);

// ── HELPERS ───────────────────────────────────────────────────────────────────
function timeAgo(iso){
  const d=(Date.now()-new Date(iso))/1000;
  if(d<60)return`${Math.floor(d)}s`;
  if(d<3600)return`${Math.floor(d/60)}m`;
  if(d<86400)return`${Math.floor(d/3600)}h`;
  return`${Math.floor(d/86400)}d`;
}
function Avatar({user,size=36}){
  const i=(user?.displayName||user?.username||'?')[0].toUpperCase();
  const colors=['#7c5cfc','#06b6d4','#10b981','#f59e0b','#ef4444','#8b5cf6'];
  const bg=colors[(i.charCodeAt(0))%colors.length];
  return user?.avatar?.url
    ? <img src={user.avatar.url} alt="" style={{width:size,height:size,borderRadius:'50%',objectFit:'cover',flexShrink:0}}/>
    : <div style={{width:size,height:size,borderRadius:'50%',background:bg+'22',border:`2px solid ${bg}`,color:bg,display:'grid',placeItems:'center',fontSize:size*.38,fontWeight:700,flexShrink:0}}>{i}</div>;
}
function Btn({children,onClick,variant='primary',disabled,style={},small}){
  const styles={
    primary:{background:'var(--accent)',color:'#fff',border:'none'},
    outline:{background:'transparent',color:'var(--text2)',border:'1px solid var(--border)'},
    ghost:{background:'transparent',color:'var(--muted)',border:'none'},
    danger:{background:'transparent',color:'var(--red)',border:'1px solid var(--red)'},
  };
  return <button onClick={onClick} disabled={disabled} style={{...styles[variant],padding:small?'6px 14px':'9px 20px',borderRadius:8,fontWeight:500,fontSize:small?12:13,opacity:disabled?.6:1,cursor:disabled?'not-allowed':'pointer',transition:'all .15s',...style}}>{children}</button>;
}
function Input({value,onChange,placeholder,type='text',error,label,multiline,rows=3}){
  const [focus,setFocus]=useState(false);
  const border=error?'var(--red)':focus?'var(--accent)':'var(--border)';
  const shared={width:'100%',padding:'10px 13px',background:'var(--surface2)',border:`1px solid ${border}`,borderRadius:8,color:'var(--text)',fontSize:13,outline:'none',fontFamily:'inherit',transition:'border .15s'};
  return <div style={{marginBottom:14}}>
    {label&&<label style={{display:'block',fontSize:12,fontWeight:500,marginBottom:5,color:'var(--text2)'}}>{label}</label>}
    {multiline
      ? <textarea value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} rows={rows} onFocus={()=>setFocus(true)} onBlur={()=>setFocus(false)} style={{...shared,resize:'vertical'}}/>
      : <input type={type} value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} onFocus={()=>setFocus(true)} onBlur={()=>setFocus(false)} style={shared}/>}
    {error&&<div style={{fontSize:11,color:'var(--red)',marginTop:3}}>{error}</div>}
  </div>;
}
function Toast({msg,onClose}){
  useEffect(()=>{const t=setTimeout(onClose,3500);return()=>clearTimeout(t)},[]);
  return <div style={{position:'fixed',top:20,right:20,background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:10,padding:'12px 18px',fontSize:13,zIndex:9999,maxWidth:300,boxShadow:'0 8px 32px rgba(0,0,0,.5)',animation:'fadeIn .3s ease'}}>{msg}</div>;
}

// ── LOGIN PAGE ────────────────────────────────────────────────────────────────
function LoginPage({onNav}){
  const {login,loading}=useAuth();
  const [f,setF]=useState({email:'demo@socialsphere.dev',password:'Demo1234'});
  const [err,setErr]=useState({});
  const [toast,setToast]=useState(null);

  const validate=()=>{
    const e={};
    if(!f.email)e.email='Email is required';
    else if(!/\S+@\S+\.\S+/.test(f.email))e.email='Enter a valid email';
    if(!f.password)e.password='Password is required';
    return e;
  };
  const submit=async()=>{
    const e=validate();
    if(Object.keys(e).length){setErr(e);return;}
    try{await login(f.email,f.password);}
    catch(ex){setToast(ex.msg||'Invalid credentials');}
  };

  return(
    <div style={{minHeight:'100vh',display:'grid',placeItems:'center',background:'var(--bg)',padding:24}}>
      {toast&&<Toast msg={toast} onClose={()=>setToast(null)}/>}
      <div style={{width:'100%',maxWidth:400}}>
        <div style={{textAlign:'center',marginBottom:36}}>
          <div style={{fontSize:30,fontWeight:800,color:'var(--accent)',marginBottom:8,letterSpacing:-1}}>SocialSphere</div>
          <div style={{color:'var(--text2)',fontSize:14}}>Sign in to your account</div>
        </div>
        <div style={{background:'var(--surface)',borderRadius:'var(--radius)',border:'1px solid var(--border)',padding:32}}>
          <Input label="Email" type="email" value={f.email} error={err.email} onChange={v=>setF(p=>({...p,email:v}))} placeholder="you@example.com"/>
          <Input label="Password" type="password" value={f.password} error={err.password} onChange={v=>setF(p=>({...p,password:v}))} placeholder="Your password"/>
          <button onClick={submit} disabled={loading} style={{width:'100%',padding:'11px',background:loading?'var(--muted)':'var(--accent)',color:'#fff',border:'none',borderRadius:8,fontWeight:600,fontSize:14,cursor:loading?'not-allowed':'pointer',marginTop:4}}>

            <strong style={{color:'var(--text2)'}}>Demo credentials pre-filled</strong><br/>
            Email: demo@socialsphere.dev<br/>
            Password: Demo1234
          </div>
        </div>
        <div style={{textAlign:'center',marginTop:18,fontSize:13,color:'var(--text2)'}}>
          No account?{' '}<span onClick={()=>onNav('register')} style={{color:'var(--accent)',fontWeight:500,cursor:'pointer'}}>Create one</span>
        </div>
      </div>
    </div>
  );
}

// ── REGISTER PAGE ─────────────────────────────────────────────────────────────
function RegisterPage({onNav}){
  const {register,loading}=useAuth();
  const [f,setF]=useState({username:'',email:'',password:'',confirm:'',displayName:''});
  const [err,setErr]=useState({});
  const [toast,setToast]=useState(null);

  const validate=()=>{
    const e={};
    if(!f.username)e.username='Required';
    else if(!/^[a-zA-Z0-9_]{3,30}$/.test(f.username))e.username='3-30 chars, letters/numbers/_';
    if(!f.email||!/\S+@\S+\.\S+/.test(f.email))e.email='Valid email required';
    if(!f.password||f.password.length<8)e.password='Min 8 characters';
    else if(!/(?=.*[a-z])(?=.*[A-Z])(?=.*\d)/.test(f.password))e.password='Must include upper, lower, number';
    if(f.password!==f.confirm)e.confirm='Passwords do not match';
    return e;
  };
  const submit=async()=>{
    const e=validate();
    if(Object.keys(e).length){setErr(e);return;}
    try{await register(f);setToast('Account created!');}
    catch(ex){setToast(ex.message||'Registration failed');}
  };
  const s=k=>v=>setF(p=>({...p,[k]:v}));

  return(
    <div style={{minHeight:'100vh',display:'grid',placeItems:'center',background:'var(--bg)',padding:24}}>
      {toast&&<Toast msg={toast} onClose={()=>setToast(null)}/>}
      <div style={{width:'100%',maxWidth:420}}>
        <div style={{textAlign:'center',marginBottom:32}}>
          <div style={{fontSize:28,fontWeight:800,color:'var(--accent)',marginBottom:6,letterSpacing:-1}}>SocialSphere</div>
          <div style={{color:'var(--text2)',fontSize:14}}>Create your account</div>
        </div>
        <div style={{background:'var(--surface)',borderRadius:'var(--radius)',border:'1px solid var(--border)',padding:32}}>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
            <Input label="Username" value={f.username} error={err.username} onChange={s('username')} placeholder="johndoe"/>
            <Input label="Display Name" value={f.displayName} onChange={s('displayName')} placeholder="John Doe"/>
          </div>
          <Input label="Email" type="email" value={f.email} error={err.email} onChange={s('email')} placeholder="you@example.com"/>
          <Input label="Password" type="password" value={f.password} error={err.password} onChange={s('password')} placeholder="Min. 8 characters"/>
          <Input label="Confirm Password" type="password" value={f.confirm} error={err.confirm} onChange={s('confirm')} placeholder="Repeat password"/>
          <button onClick={submit} disabled={loading} style={{width:'100%',padding:'11px',background:loading?'var(--muted)':'var(--accent)',color:'#fff',border:'none',borderRadius:8,fontWeight:600,fontSize:14,cursor:loading?'not-allowed':'pointer',marginTop:4}}>
            {loading?'Creating account...':'Create account'}
          </button>
        </div>
        <div style={{textAlign:'center',marginTop:18,fontSize:13,color:'var(--text2)'}}>
          Have an account?{' '}<span onClick={()=>onNav('login')} style={{color:'var(--accent)',fontWeight:500,cursor:'pointer'}}>Sign in</span>
        </div>
      </div>
    </div>
  );
}

function PostCard({post,onLike,onComment,onDelete,currentUserId}){
  const [showCmt,setShowCmt]=useState(false);
  const [cmt,setCmt]=useState('');
  const fmtContent=text=>text.split(/(#\w+|@\w+)/g).map((p,i)=>
    /^[#@]/.test(p)?<span key={i} style={{color:'var(--accent)',cursor:'pointer'}}>{p}</span>:p
  );
  return(
    <article className="fade-in" style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:'var(--radius)',padding:20,transition:'border-color .15s'}}>
      <div style={{display:'flex',alignItems:'flex-start',gap:12,marginBottom:14}}>

          <div style={{display:'flex',alignItems:'center',gap:6,flexWrap:'wrap'}}>
            <span style={{fontWeight:600,fontSize:14}}>{post.author.displayName}</span>
            {post.author.isVerified&&<Icons.verified/>}
            <span style={{color:'var(--muted)',fontSize:13}}>@{post.author.username}</span>
            <span style={{color:'var(--muted)',fontSize:12,marginLeft:'auto'}}>{timeAgo(post.createdAt)}</span>
          </div>
        </div>
        {(post.author._id===currentUserId)&&
          <button onClick={()=>onDelete(post._id)} style={{background:'none',border:'none',color:'var(--muted)',cursor:'pointer',padding:4,borderRadius:6,fontSize:12,transition:'color .15s'}}
            onMouseEnter={e=>e.currentTarget.style.color='var(--red)'}
            onMouseLeave={e=>e.currentTarget.style.color='var(--muted)'}
          >delete</button>}
      </div>
      <p style={{fontSize:14,lineHeight:1.7,color:'var(--text)',marginBottom:16,whiteSpace:'pre-wrap'}}>{fmtContent(post.content)}</p>
      <div style={{display:'flex',gap:4,paddingBottom:14}}>
        {post.hashtags.map(t=><span key={t} style={{fontSize:11,color:'var(--accent)',background:'var(--accent-dim)',padding:'2px 8px',borderRadius:99}}>#{t}</span>)}
      </div>
      <div style={{display:'flex',alignItems:'center',gap:6,paddingTop:12,borderTop:'1px solid var(--border)'}}>
        {[
          {icon:()=>Icons.heart(16,post.liked),count:post.likeCount,active:post.liked,color:'var(--red)',onClick:()=>onLike(post._id),label:'Like'},
          {icon:()=>Icons.comment(16),count:post.commentCount,onClick:()=>setShowCmt(s=>!s),label:'Comment'},
          {icon:()=>Icons.share(16),count:0,onClick:()=>{},label:'Share'},
        ].map(({icon,count,active,color,onClick,label})=>(
          <button key={label} onClick={onClick} aria-label={label}
            style={{display:'flex',alignItems:'center',gap:6,background:'none',border:'none',color:active?color||'var(--accent)':'var(--muted)',fontSize:13,cursor:'pointer',padding:'5px 10px',borderRadius:7,transition:'all .15s'}}
            onMouseEnter={e=>e.currentTarget.style.color=color||'var(--accent)'}
            onMouseLeave={e=>e.currentTarget.style.color=active?color||'var(--accent)':'var(--muted)'}
          >{icon()}{count>0&&<span style={{fontWeight:500}}>{count}</span>}</button>
        ))}
      </div>
      {showCmt&&(
        <div style={{marginTop:14,paddingTop:14,borderTop:'1px solid var(--border)',display:'flex',gap:10}}>
          <input value={cmt} onChange={e=>setCmt(e.target.value)} placeholder="Write a comment..."
            style={{flex:1,padding:'8px 12px',background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:8,color:'var(--text)',fontSize:13,outline:'none'}}
            onFocus={e=>e.target.style.borderColor='var(--accent)'}
            onBlur={e=>e.target.style.borderColor='var(--border)'}
          />
          <button onClick={()=>{if(cmt.trim()){onComment(post._id,cmt);setCmt('');setShowCmt(false);}}}
            style={{padding:'8px 16px',background:'var(--accent)',color:'#fff',border:'none',borderRadius:8,fontWeight:500,fontSize:13,cursor:'pointer'}}>Post</button>
        </div>
      )}
    </article>
  );
}

// ── FEED PAGE ─────────────────────────────────────────────────────────────────
function FeedPage(){
  const {user}=useAuth();
  const [posts,setPosts]=useState(initPosts);
  const [content,setContent]=useState('');
  const [submitting,setSubmitting]=useState(false);
  const [toast,setToast]=useState(null);

  const submit=()=>{
    if(!content.trim())return;
    setSubmitting(true);
    setTimeout(()=>{
      const hashtags=[...content.matchAll(/#(\w+)/g)].map(m=>m[1]);
      setPosts(p=>[{_id:Date.now().toString(),content,author:user,likeCount:0,commentCount:0,createdAt:new Date().toISOString(),hashtags,liked:false,comments:[]},...p]);
      setContent('');setSubmitting(false);setToast('Posted!');
    },500);
  };
  const toggleLike=id=>setPosts(p=>p.map(x=>x._id===id?{...x,liked:!x.liked,likeCount:x.likeCount+(x.liked?-1:1)}:x));
  const addComment=(id,text)=>{setPosts(p=>p.map(x=>x._id===id?{...x,commentCount:x.commentCount+1}:x));setToast('Comment posted!');};
  const deletePost=id=>{setPosts(p=>p.filter(x=>x._id!==id));setToast('Post deleted.');};

  return(
    <div style={{maxWidth:640,margin:'0 auto',padding:'24px 16px',width:'100%'}}>
      {toast&&<Toast msg={toast} onClose={()=>setToast(null)}/>}
      <div style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:'var(--radius)',padding:20,marginBottom:20}}>
        <div style={{display:'flex',gap:12}}>
          <Avatar user={user} size={42}/>
          <div style={{flex:1}}>
            <textarea value={content} onChange={e=>setContent(e.target.value)} placeholder="What's on your mind? Use #hashtags and @mentions"
              rows={3} style={{width:'100%',background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:9,padding:'10px 13px',color:'var(--text)',fontSize:14,resize:'none',outline:'none',fontFamily:'inherit'}}
              onFocus={e=>e.target.style.borderColor='var(--accent)'}
              onBlur={e=>e.target.style.borderColor='var(--border)'}
            />
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:10}}>
              <span style={{fontSize:12,color:'var(--muted)'}}>{content.length}/2000</span>
              <button onClick={submit} disabled={!content.trim()||submitting}
                style={{padding:'8px 22px',background:content.trim()?'var(--accent)':'var(--muted)',color:'#fff',border:'none',borderRadius:8,fontWeight:600,fontSize:13,cursor:content.trim()?'pointer':'not-allowed'}}>
                {submitting?'Posting...':'Post'}
              </button>
            </div>
          </div>
        </div>
      </div>
      <div style={{display:'flex',flexDirection:'column',gap:12}}>
        {posts.map(p=><PostCard key={p._id} post={p} onLike={toggleLike} onComment={addComment} onDelete={deletePost} currentUserId={user?._id}/>)}
      </div>
    </div>
  );
}

// ── EXPLORE PAGE ──────────────────────────────────────────────────────────────
function ExplorePage(){
  const [q,setQ]=useState('');
  const [users,setUsers]=useState(mockUsers);
  const filtered=users.filter(u=>!q||u.username.includes(q.toLowerCase())||u.displayName.toLowerCase().includes(q.toLowerCase()));
  const toggleFollow=id=>setUsers(u=>u.map(x=>x._id===id?{...x,following:!x.following,followerCount:x.followerCount+(x.following?-1:1)}:x));
  return(
    <div style={{maxWidth:720,margin:'0 auto',padding:'24px 16px',width:'100%'}}>
      <h1 style={{fontSize:20,fontWeight:700,marginBottom:20}}>Explore</h1>
      <input value={q} onChange={e=>setQ(e.target.value)} placeholder="Search people..."
        style={{width:'100%',padding:'11px 16px',background:'var(--surface)',border:'1px solid var(--border)',borderRadius:10,color:'var(--text)',fontSize:14,outline:'none',marginBottom:24}}
        onFocus={e=>e.target.style.borderColor='var(--accent)'}
        onBlur={e=>e.target.style.borderColor='var(--border)'}
      />
      <div style={{display:'grid',gridTemplateColumns:'1fr 260px',gap:24,alignItems:'start'}}>
        <div>
          <div style={{fontSize:11,fontWeight:600,color:'var(--muted)',textTransform:'uppercase',letterSpacing:'0.08em',marginBottom:12}}>People to follow</div>
          <div style={{display:'flex',flexDirection:'column',gap:8}}>
            {filtered.map(u=>(
              <div key={u._id} className="fade-in" style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:'var(--radius)',padding:16,display:'flex',alignItems:'center',gap:14}}>
                <Avatar user={u} size={46}/>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontWeight:600,fontSize:14,display:'flex',alignItems:'center',gap:5}}>{u.displayName}{u.isVerified&&<span style={{color:'var(--accent)',fontSize:12}}>✓</span>}</div>
                  <div style={{color:'var(--muted)',fontSize:12}}>@{u.username} · {u.followerCount.toLocaleString()} followers</div>
                  <div style={{fontSize:13,color:'var(--text2)',marginTop:3}}>{u.bio}</div>
                </div>
                <button onClick={()=>toggleFollow(u._id)}
                  style={{padding:'7px 16px',borderRadius:8,border:u.following?'1px solid var(--border)':'none',background:u.following?'transparent':'var(--accent)',color:u.following?'var(--text2)':'#fff',fontSize:13,fontWeight:500,cursor:'pointer',flexShrink:0}}>
                  {u.following?'Following':'Follow'}
                </button>
              </div>
            ))}
          </div>
        </div>
        <div>
          <div style={{fontSize:11,fontWeight:600,color:'var(--muted)',textTransform:'uppercase',letterSpacing:'0.08em',marginBottom:12}}>Trending</div>
          <div style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:'var(--radius)',overflow:'hidden'}}>
            {TRENDING.map((tag,i)=>(
              <div key={tag} style={{padding:'11px 16px',borderBottom:i<TRENDING.length-1?'1px solid var(--border)':'none',display:'flex',justifyContent:'space-between',cursor:'pointer',transition:'background .15s'}}
                onMouseEnter={e=>e.currentTarget.style.background='var(--surface2)'}
                onMouseLeave={e=>e.currentTarget.style.background='transparent'}
              >
                <span style={{color:'var(--accent)',fontWeight:500}}>#{tag}</span>
                <span style={{color:'var(--muted)',fontSize:12}}>{100+i*73} posts</span>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

// ── PROFILE PAGE ──────────────────────────────────────────────────────────────
function ProfilePage({targetUser}){
  const {user}=useAuth();
  const [tab,setTab]=useState('posts');
  const p=targetUser||{...user,bio:'Full stack developer building SocialSphere. Node.js + React + Socket.io + MongoDB.',followerCount:128,followingCount:64,location:'Vijayawada, India'};
  const profilePosts=initPosts.filter(x=>!targetUser||x.author.username===targetUser.username).slice(0,3);
  return(
    <div style={{maxWidth:700,margin:'0 auto',padding:'24px 16px',width:'100%'}}>
      <div style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:'var(--radius)',overflow:'hidden',marginBottom:16}}>
        <div style={{height:140,background:'linear-gradient(135deg,#7c5cfc33,#7c5cfc66,#a78bfa44)'}}/>
        <div style={{padding:'0 24px 24px',marginTop:-40}}>
          <div style={{display:'flex',alignItems:'flex-end',justifyContent:'space-between',marginBottom:16}}>
            <div style={{border:'3px solid var(--bg)',borderRadius:'50%'}}><Avatar user={p} size={80}/></div>
            <Btn variant="outline">Edit profile</Btn>
          </div>
          <div style={{fontWeight:700,fontSize:18,display:'flex',alignItems:'center',gap:6}}>{p.displayName}{p.isVerified&&<span style={{color:'var(--accent)'}}>✓</span>}</div>
          <div style={{color:'var(--muted)',fontSize:13,marginBottom:10}}>@{p.username}</div>
          <div style={{fontSize:14,color:'var(--text2)',marginBottom:14,lineHeight:1.65,maxWidth:500}}>{p.bio}</div>
          <div style={{display:'flex',gap:24,fontSize:13}}>
            <span><strong>{(p.followerCount||0).toLocaleString()}</strong> <span style={{color:'var(--muted)'}}>followers</span></span>
            <span><strong>{(p.followingCount||0)}</strong> <span style={{color:'var(--muted)'}}>following</span></span>
          </div>
        </div>
      </div>
      <div style={{display:'flex',borderBottom:'1px solid var(--border)',marginBottom:16}}>
        {['posts','replies','media','likes'].map(t=>(
          <button key={t} onClick={()=>setTab(t)} style={{padding:'12px 20px',background:'none',border:'none',color:tab===t?'var(--accent)':'var(--muted)',fontWeight:tab===t?600:400,fontSize:14,cursor:'pointer',borderBottom:tab===t?'2px solid var(--accent)':'2px solid transparent',marginBottom:-1,textTransform:'capitalize'}}>
            {t}
          </button>
        ))}
      </div>
      <div style={{display:'flex',flexDirection:'column',gap:12}}>
        {(tab==='posts'?profilePosts:[]).map(post=>(
          <div key={post._id} style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:'var(--radius)',padding:20}}>
            <p style={{fontSize:14,lineHeight:1.65,marginBottom:12}}>{post.content}</p>
            <div style={{display:'flex',gap:20,color:'var(--muted)',fontSize:13}}>
              <span>{post.likeCount} likes</span><span>{post.commentCount} comments</span>
              <span style={{marginLeft:'auto'}}>{timeAgo(post.createdAt)}</span>
            </div>
          </div>
        ))}
        {tab!=='posts'&&<div style={{textAlign:'center',padding:40,color:'var(--muted)',fontSize:14}}>No {tab} yet.</div>}
      </div>
    </div>
  );
}

// ── CHAT PAGE ─────────────────────────────────────────────────────────────────
function ChatPage(){
  const [active,setActive]=useState(null);
  const [msg,setMsg]=useState('');
  const [msgs,setMsgs]=useState(mockMessages);
  const [typing,setTyping]=useState(false);
  const bottomRef=useRef(null);

  useEffect(()=>{
    if(active){
      setTyping(true);
      const t=setTimeout(()=>setTyping(false),2500);
      return()=>clearTimeout(t);
    }
  },[active]);

  useEffect(()=>{ bottomRef.current?.scrollIntoView({behavior:'smooth'}); },[msgs,typing]);

  const send=()=>{
    if(!msg.trim()||!active)return;
    setMsgs(m=>[...m,{_id:Date.now().toString(),content:msg,sender:'me',time:new Date().toLocaleTimeString('en',{hour:'2-digit',minute:'2-digit'})}]);
    setMsg('');
    setTimeout(()=>{
      setMsgs(m=>[...m,{_id:Date.now().toString()+'r',content:'Got it! Working on it now.',sender:'them',time:new Date().toLocaleTimeString('en',{hour:'2-digit',minute:'2-digit'})}]);
    },1200);
  };

  return(
    <div style={{display:'flex',height:'100vh',overflow:'hidden'}}>
      <div style={{width:290,flexShrink:0,borderRight:'1px solid var(--border)',display:'flex',flexDirection:'column',background:'var(--surface)'}}>
        <div style={{padding:'18px 14px 12px',borderBottom:'1px solid var(--border)'}}>
          <div style={{fontWeight:700,fontSize:16,marginBottom:12}}>Messages</div>
          <input placeholder="Search..." style={{width:'100%',padding:'8px 12px',background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:8,color:'var(--text)',fontSize:13,outline:'none'}}/>
        </div>
        <div style={{flex:1,overflowY:'auto'}}>
          {mockChats.map(c=>(
            <div key={c._id} onClick={()=>{setActive(c);setMsgs(mockMessages);}} style={{padding:'13px 14px',cursor:'pointer',background:active?._id===c._id?'var(--accent-dim)':'transparent',borderLeft:active?._id===c._id?'2px solid var(--accent)':'2px solid transparent',transition:'all .15s'}}
              onMouseEnter={e=>{if(active?._id!==c._id)e.currentTarget.style.background='var(--surface2)'}}
              onMouseLeave={e=>{if(active?._id!==c._id)e.currentTarget.style.background='transparent'}}
            >
              <div style={{display:'flex',alignItems:'center',gap:10}}>
                <Avatar user={{displayName:c.name}} size={38}/>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{display:'flex',justifyContent:'space-between',marginBottom:2}}>
                    <span style={{fontWeight:600,fontSize:13}}>{c.name}</span>
                    <span style={{fontSize:11,color:'var(--muted)'}}>{c.time}</span>
                  </div>
                  <div style={{fontSize:12,color:'var(--muted)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{c.preview}</div>
                </div>
                {c.unread>0&&<span style={{background:'var(--accent)',color:'#fff',borderRadius:99,padding:'1px 6px',fontSize:11,fontWeight:600,flexShrink:0}}>{c.unread}</span>}
              </div>
            </div>
          ))}
        </div>
      </div>

      <div style={{flex:1,display:'flex',flexDirection:'column',background:'var(--bg)'}}>
        {active?(
          <>
            <div style={{padding:'14px 20px',borderBottom:'1px solid var(--border)',display:'flex',alignItems:'center',gap:12,background:'var(--surface)'}}>
              <Avatar user={{displayName:active.name}} size={36}/>
              <div>
                <div style={{fontWeight:600,fontSize:14}}>{active.name}</div>
                <div style={{fontSize:11,color:'var(--green)'}}>● Online</div>
              </div>
            </div>
            <div style={{flex:1,overflowY:'auto',padding:'20px',display:'flex',flexDirection:'column',gap:10}}>
              {msgs.map(m=>(
                <div key={m._id} className="fade-in" style={{display:'flex',justifyContent:m.sender==='me'?'flex-end':'flex-start'}}>
                  <div style={{maxWidth:'68%',padding:'10px 14px',borderRadius:m.sender==='me'?'14px 14px 4px 14px':'14px 14px 14px 4px',background:m.sender==='me'?'var(--accent)':'var(--surface2)',border:m.sender==='me'?'none':'1px solid var(--border)',fontSize:14,lineHeight:1.5}}>
                    {m.content}
                    <div style={{fontSize:10,color:m.sender==='me'?'rgba(255,255,255,.55)':'var(--muted)',marginTop:4,textAlign:'right'}}>{m.time}</div>
                  </div>
                </div>
              ))}
              {typing&&(
                <div style={{display:'flex',alignItems:'center',gap:8,color:'var(--muted)',fontSize:12}}>
                  <div style={{display:'flex',gap:3,alignItems:'center'}}>
                    {[0,1,2].map(i=><span key={i} style={{width:5,height:5,borderRadius:'50%',background:'var(--muted)',display:'inline-block',animation:`bounce 1.3s ${i*0.2}s infinite`}}/>)}
                  </div>
                  {active.name} is typing...
                </div>
              )}
              <div ref={bottomRef}/>
            </div>
            <div style={{padding:'14px 20px',borderTop:'1px solid var(--border)',display:'flex',gap:10,background:'var(--surface)'}}>
              <input value={msg} onChange={e=>setMsg(e.target.value)} onKeyDown={e=>e.key==='Enter'&&send()}
                placeholder={`Message ${active.name}...`}
                style={{flex:1,padding:'10px 14px',background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:10,color:'var(--text)',fontSize:14,outline:'none'}}
                onFocus={e=>e.target.style.borderColor='var(--accent)'}
                onBlur={e=>e.target.style.borderColor='var(--border)'}
              />
              <button onClick={send} style={{padding:'10px 20px',background:'var(--accent)',color:'#fff',border:'none',borderRadius:10,fontWeight:600,fontSize:14,cursor:'pointer'}}>Send</button>
            </div>
          </>
        ):(
          <div style={{flex:1,display:'grid',placeItems:'center',color:'var(--muted)',fontSize:15}}>Select a conversation</div>
        )}
      </div>
    </div>
  );
}

// ── ROOT APP ──────────────────────────────────────────────────────────────────
function App(){
  const {isAuthenticated}=useAuth();
  const [page,setPage]=useState('login');

  useEffect(()=>{
    if(isAuthenticated&&(page==='login'||page==='register'))setPage('feed');
    if(!isAuthenticated&&!['login','register'].includes(page))setPage('login');
  },[isAuthenticated]);

  if(!isAuthenticated){
    return page==='register'
      ? <RegisterPage onNav={setPage}/>
      : <LoginPage onNav={setPage}/>;
  }

  return(
    <div style={{display:'flex',minHeight:'100vh'}}>
      <Sidebar page={page} onNav={setPage}/>
      <main style={{flex:1,minWidth:0,overflowY:'auto',maxHeight:'100vh'}}>
        {page==='feed'&&<FeedPage/>}
        {page==='explore'&&<ExplorePage/>}
        {page==='chat'&&<ChatPage/>}
        {page==='profile'&&<ProfilePage/>}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(
  <AuthProvider><App/></AuthProvider>
);
</script>
</body>
